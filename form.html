<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻豆監理站 自衛消防編組訓練報名</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Microsoft JhengHei',Arial,sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
  .card{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.12);padding:2.5rem;width:100%;max-width:560px;}
  .header{text-align:center;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:2px solid #e5e7eb;}
  .badge{display:inline-block;background:#e6f1fb;color:#0c447c;font-size:20px;font-weight:700;padding:8px 24px;border-radius:99px;margin-bottom:14px;}
  h1{font-size:22px;font-weight:700;color:#1a1a2e;line-height:1.7;}
  .field{margin-bottom:1.5rem;}
  label{display:block;font-size:16px;color:#374151;font-weight:600;margin-bottom:8px;}
  label .req{color:#e24b4a;}
  input,select{width:100%;padding:14px 16px;font-size:16px;border:1.5px solid #d1d5db;border-radius:10px;outline:none;font-family:inherit;transition:border-color 0.2s;background:#fff;color:#374151;}
  input:focus,select:focus{border-color:#185FA5;box-shadow:0 0 0 4px rgba(24,95,165,0.12);}
  .btn{width:100%;padding:16px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.2s;margin-top:0.5rem;}
  .btn:hover{background:#0c447c;}
  .btn:disabled{background:#9ca3af;cursor:not-allowed;}
  .success{display:none;background:#eaf3de;border:1.5px solid #3b6d11;border-radius:10px;padding:1.5rem;text-align:center;margin-top:1.25rem;}
  .success .icon{font-size:40px;margin-bottom:10px;}
  .success h3{color:#27500a;font-size:18px;font-weight:700;}
  .success p{color:#3b6d11;font-size:15px;margin-top:6px;}
  .error{display:none;background:#fcebeb;border:1.5px solid #a32d2d;border-radius:10px;padding:1.25rem;text-align:center;color:#791f1f;font-size:15px;margin-top:1.25rem;}
  .footer{text-align:center;font-size:13px;color:#9ca3af;margin-top:1.75rem;}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="badge">麻豆監理站</div>
    <h1>自衛消防編組訓練<br>名冊暨簽到表</h1>
  </div>

  <div class="field">
    <label>單位 <span class="req">*</span></label>
    <select id="f-unit">
      <option value="">— 請選擇單位 —</option>
      <option>站長室</option>
      <option>副站長室</option>
      <option>第一股</option>
      <option>第二股</option>
      <option>第三股</option>
      <option>第四股</option>
      <option>第五股</option>
    </select>
  </div>
  <div class="field">
    <label>職稱 <span class="req">*</span></label>
    <input type="text" id="f-title" placeholder="請輸入職稱">
  </div>
  <div class="field">
    <label>姓名 <span class="req">*</span></label>
    <input type="text" id="f-name" placeholder="請輸入真實姓名">
  </div>

  <button class="btn" id="submit-btn" onclick="submitForm()">送出報名</button>

  <div class="success" id="success-box">
    <div class="icon">✅</div>
    <h3>報名成功！</h3>
    <p>感謝您完成報名，請準時出席訓練。</p>
  </div>
  <div class="error" id="error-box">送出失敗，請稍後再試或聯絡承辦人員。</div>

  <div class="footer">麻豆監理站 · 自衛消防編組訓練</div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxrrA6weUfSXWjBesLQDUP1WNsJh7Q0wqRaBH2u31zTwCxPLXLATX3_vAEltIG_QrFGxg/exec';

async function submitForm() {
  const unit  = document.getElementById('f-unit').value;
  const title = document.getElementById('f-title').value.trim();
  const name  = document.getElementById('f-name').value.trim();
  if (!unit)  { alert('請選擇單位'); return; }
  if (!title) { alert('請填寫職稱'); return; }
  if (!name)  { alert('請填寫姓名'); return; }

  const btn = document.getElementById('submit-btn');
  btn.textContent = '送出中，請稍候…';
  btn.disabled = true;
  document.getElementById('success-box').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';

  try {
    await fetch(GAS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ unit, title, name })
    });
    document.getElementById('success-box').style.display = 'block';
    document.getElementById('f-unit').value  = '';
    document.getElementById('f-title').value = '';
    document.getElementById('f-name').value  = '';
    btn.textContent = '再次報名';
    btn.disabled = false;
  } catch(e) {
    document.getElementById('error-box').style.display = 'block';
    btn.textContent = '送出報名';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
